<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hi 小何 💖</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #ffe4ec 0%, #ffd1dc 30%, #ffe0f0 60%, #ffdae9 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    overflow: hidden;
    cursor: default;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  /* ---- 飘落的小心心 ---- */
  .hearts-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg) scale(0.5); opacity: 1; }
    80%  { opacity: 0.8; }
    100% { transform: translateY(-10vh) rotate(360deg) scale(1.4); opacity: 0; }
  }

  .floating-heart {
    position: absolute;
    bottom: -60px;
    font-size: 28px;
    animation: floatUp 7s linear infinite;
  }

  /* ---- 点击爆发的小心心 ---- */
  @keyframes burstOut {
    0%   { transform: translate(0, 0) scale(0); opacity: 1; }
    50%  { opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(1.2); opacity: 0; }
  }

  .burst-heart {
    position: fixed;
    pointer-events: none;
    font-size: 24px;
    z-index: 20;
    animation: burstOut 1s ease-out forwards;
  }

  /* ---- 主卡片 ---- */
  .card {
    position: relative;
    z-index: 1;
    background: rgba(255, 255, 255, 0.75);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 32px;
    padding: 48px 40px 40px;
    max-width: 420px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(255, 105, 135, 0.25), 0 0 0 1px rgba(255, 255, 255, 0.6);
    animation: cardFloat 4s ease-in-out infinite;
    transition: transform 0.1s;
  }

  @keyframes cardFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  /* ---- SVG Kitty ---- */
  .kitty-wrapper {
    width: 180px;
    height: 180px;
    margin: 0 auto 20px;
    cursor: pointer;
    transition: transform 0.15s;
    position: relative;
  }
  .kitty-wrapper:active {
    transform: scale(0.92);
  }
  .kitty-wrapper.wiggle {
    animation: wiggle 0.5s ease-in-out;
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(0); }
    20% { transform: rotate(-8deg); }
    40% { transform: rotate(8deg); }
    60% { transform: rotate(-6deg); }
    80% { transform: rotate(6deg); }
  }

  .kitty-wrapper svg {
    width: 100%;
    height: 100%;
  }

  /* 点击计数提示 */
  .tap-hint {
    position: absolute;
    top: -8px;
    right: -8px;
    background: #ff2d55;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 20px;
    opacity: 0;
    transform: scale(0);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .tap-hint.show {
    opacity: 1;
    transform: scale(1);
  }

  /* ---- 文案 ---- */
  .greeting {
    font-size: 15px;
    color: #e8889a;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .message {
    font-size: 28px;
    font-weight: 700;
    color: #e8456b;
    line-height: 1.5;
    margin-bottom: 8px;
    text-shadow: 0 2px 8px rgba(232, 69, 107, 0.12);
  }

  .sub-message {
    font-size: 13px;
    color: #d49ba8;
    margin-bottom: 16px;
  }

  /* ---- 按钮 ---- */
  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    padding: 12px 28px;
    border-radius: 50px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    letter-spacing: 1px;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-primary {
    background: linear-gradient(135deg, #ff6b81, #ff3b5c);
    color: #fff;
    box-shadow: 0 6px 20px rgba(255, 59, 92, 0.4);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(255, 59, 92, 0.55);
  }

  .btn-secondary {
    background: #fff;
    color: #ff6b81;
    border: 2px solid #ffccd5;
  }
  .btn-secondary:hover {
    background: #fff5f7;
    border-color: #ff6b81;
  }

  /* ---- 底部 ---- */
  .footer-decor {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 20px;
    font-size: 20px;
    opacity: 0.5;
  }

  /* ---- 弹窗 ---- */
  .popup-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.3);
    z-index: 10;
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .popup-overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .popup {
    background: #fff;
    border-radius: 24px;
    padding: 36px 28px 28px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
    max-width: 320px;
    width: 85%;
  }
  .popup-emoji {
    font-size: 56px;
    margin-bottom: 12px;
  }
  .popup-text {
    font-size: 18px;
    color: #e8456b;
    font-weight: 600;
  }

  /* ---- 响应式 ---- */
  @media (max-width: 420px) {
    .card { padding: 36px 24px 28px; }
    .message { font-size: 22px; }
    .kitty-wrapper { width: 150px; height: 150px; }
  }
</style>
</head>
<body>

<div class="hearts-container" id="heartsContainer"></div>

<main class="card" id="card">
  <!-- Hello Kitty SVG -->
  <div class="kitty-wrapper" id="kittyWrapper" onclick="tapKitty(event)">
    <div class="tap-hint" id="tapHint">+1 💕</div>
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <!-- 左耳 -->
      <ellipse cx="42" cy="52" rx="22" ry="24" fill="#fff" stroke="#e890a0" stroke-width="2.5" transform="rotate(-15 42 52)"/>
      <ellipse cx="42" cy="52" rx="12" ry="14" fill="#fdd0da" transform="rotate(-15 42 52)"/>
      <!-- 右耳 -->
      <ellipse cx="158" cy="52" rx="22" ry="24" fill="#fff" stroke="#e890a0" stroke-width="2.5" transform="rotate(15 158 52)"/>
      <ellipse cx="158" cy="52" rx="12" ry="14" fill="#fdd0da" transform="rotate(15 158 52)"/>

      <!-- 脸 -->
      <ellipse cx="100" cy="108" rx="72" ry="63" fill="#fff" stroke="#e890a0" stroke-width="2.5"/>

      <!-- 蝴蝶结 -->
      <g transform="translate(148, 38)">
        <ellipse cx="-11" cy="0" rx="15" ry="10" fill="#ff2d55" transform="rotate(-20)"/>
        <ellipse cx="11" cy="0" rx="15" ry="10" fill="#ff2d55" transform="rotate(20)"/>
        <circle cx="0" cy="0" r="9" fill="#ff2d55"/>
        <circle cx="0" cy="0" r="3" fill="#ff5c7a"/>
      </g>

      <!-- 左眼 -->
      <ellipse cx="76" cy="100" rx="7" ry="9" fill="#333"/>
      <ellipse cx="78" cy="97" rx="2.5" ry="3" fill="#fff"/>

      <!-- 右眼 -->
      <ellipse cx="124" cy="100" rx="7" ry="9" fill="#333"/>
      <ellipse cx="126" cy="97" rx="2.5" ry="3" fill="#fff"/>

      <!-- 鼻子 -->
      <ellipse cx="100" cy="114" rx="7" ry="5.5" fill="#fcc700"/>

      <!-- 左胡须 -->
      <line x1="70" y1="104" x2="22" y2="97" stroke="#888" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="70" y1="113" x2="18" y2="113" stroke="#888" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="70" y1="122" x2="22" y2="129" stroke="#888" stroke-width="1.8" stroke-linecap="round"/>

      <!-- 右胡须 -->
      <line x1="130" y1="97" x2="178" y2="104" stroke="#888" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="130" y1="113" x2="182" y2="113" stroke="#888" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="130" y1="129" x2="178" y2="122" stroke="#888" stroke-width="1.8" stroke-linecap="round"/>

      <!-- 腮红 -->
      <ellipse cx="58" cy="115" rx="10" ry="6" fill="#ffd1dc" opacity="0.5"/>
      <ellipse cx="142" cy="115" rx="10" ry="6" fill="#ffd1dc" opacity="0.5"/>
    </svg>
  </div>

  <p class="greeting">💝 小何专属 💝</p>
  <h1 class="message">Hi 小何，<br>今晚战况如何？</h1>
  <p class="sub-message">—— 来自你的专属后勤部长 ✨</p>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="showPopup(event)">点我 💌</button>
    <button class="btn btn-secondary" onclick="refloatHearts()">再来一波小心心 💕</button>
  </div>

  <div class="footer-decor">
    🎀 🐱 🌸 🎀 🐱 🌸
  </div>
</main>

<!-- 弹窗 -->
<div class="popup-overlay" id="popupOverlay" onclick="hidePopup()">
  <div class="popup" onclick="event.stopPropagation()">
    <div class="popup-emoji">💖</div>
    <p class="popup-text">你永远是我的<br>最棒的女朋友~</p>
  </div>
</div>

<script>
  const heartsContainer = document.getElementById('heartsContainer');
  const kittyWrapper = document.getElementById('kittyWrapper');
  const tapHint = document.getElementById('tapHint');
  const emojis = ['💖', '💕', '💗', '🌸', '🎀', '💝', '✨', '💓'];
  const burstEmojis = ['💖', '💕', '💗', '💘', '💝', '💓', '✨', '🌸', '🎀'];
  let tapCount = 0;

  // ---- 背景飘落的小心心 ----
  function createFloatingHeart() {
    const el = document.createElement('span');
    el.className = 'floating-heart';
    el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.left = Math.random() * 95 + '%';
    el.style.animationDuration = (6 + Math.random() * 8) + 's';
    el.style.animationDelay = Math.random() * 5 + 's';
    el.style.fontSize = (18 + Math.random() * 30) + 'px';
    heartsContainer.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }

  for (let i = 0; i < 18; i++) createFloatingHeart();
  setInterval(createFloatingHeart, 1200);

  function refloatHearts() {
    for (let i = 0; i < 15; i++) {
      setTimeout(createFloatingHeart, i * 70);
    }
  }

  // ---- 点击空白处爆发小心心 ----
  document.addEventListener('click', function(e) {
    // 排除按钮和Kitty（Kitty有自己的交互）
    if (e.target.closest('button') || e.target.closest('.kitty-wrapper') || e.target.closest('.popup')) return;
    burstHearts(e.clientX, e.clientY);
  });

  function burstHearts(x, y, count = 8) {
    for (let i = 0; i < count; i++) {
      const el = document.createElement('span');
      el.className = 'burst-heart';
      el.textContent = burstEmojis[Math.floor(Math.random() * burstEmojis.length)];
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const dist = 50 + Math.random() * 80;
      el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      el.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      el.style.fontSize = (16 + Math.random() * 24) + 'px';
      el.style.animationDuration = (0.7 + Math.random() * 0.6) + 's';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  // ---- 点击 Kitty 互动 ----
  function tapKitty(event) {
    event.stopPropagation();
    tapCount++;

    // 摇晃
    kittyWrapper.classList.remove('wiggle');
    void kittyWrapper.offsetWidth; // reflow
    kittyWrapper.classList.add('wiggle');

    // 弹出 +1
    tapHint.classList.add('show');
    tapHint.textContent = tapCount === 1 ? '+1 💕' :
                          tapCount === 5 ? '好喜欢 💗' :
                          tapCount === 10 ? '停不下来 😻' :
                          tapCount === 20 ? '你是最棒的 🎀' :
                          '+' + tapCount + ' 💕';
    setTimeout(() => tapHint.classList.remove('show'), 1200);

    // 从 Kitty 位置爆爱心
    const rect = kittyWrapper.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    burstHearts(cx, cy, 10);
  }

  // ---- 弹窗 ----
  function showPopup(event) {
    event.stopPropagation();
    document.getElementById('popupOverlay').classList.add('show');
  }

  function hidePopup() {
    document.getElementById('popupOverlay').classList.remove('show');
  }

  // ---- 移动端触摸滑动时的小尾巴 ----
  let touchTrailTimer = null;
  document.addEventListener('touchmove', function(e) {
    if (e.target.closest('button') || e.target.closest('.popup')) return;
    if (touchTrailTimer) return;
    touchTrailTimer = setTimeout(() => { touchTrailTimer = null; }, 150);
    const touch = e.touches[0];
    const el = document.createElement('span');
    el.className = 'burst-heart';
    el.textContent = '✨';
    el.style.left = touch.clientX + 'px';
    el.style.top = touch.clientY + 'px';
    el.style.fontSize = '14px';
    el.style.setProperty('--dx', (Math.random() - 0.5) * 40 + 'px');
    el.style.setProperty('--dy', (Math.random() - 0.5) * 40 + 'px');
    el.style.animationDuration = '0.6s';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }, { passive: true });
</script>

</body>
</html>
