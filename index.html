<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For 小何 💖</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #ff7b9c;
    --pink-light: #ffb8cc;
    --peach: #ffb088;
    --bg-top: #fff0f3;
    --bg-mid: #ffe8f0;
    --bg-end: #ffe0ec;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(180deg, #fff0f3 0%, #ffe4ee 30%, #ffdce8 60%, #ffe0ec 100%);
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    display: flex;
    justify-content: center;
    padding: 24px 16px 60px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
  }

  /* ---- 云朵装饰 ---- */
  .clouds {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .cloud-wrap {
    position: absolute;
    animation: drift linear infinite;
    opacity: 0.7;
  }
  @keyframes drift {
    0%   { transform: translateX(-180px); }
    100% { transform: translateX(calc(100vw + 180px)); }
  }
  .cloud-wrap span {
    position: absolute;
    background: rgba(255,255,255,0.8);
    border-radius: 50%;
  }

  /* ---- 飘落小心心 ---- */
  @keyframes fall {
    0%   { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
  }
  .falling-heart {
    position: fixed; pointer-events: none; z-index: 1;
    font-size: 22px;
    animation: fall linear infinite;
  }

  /* ---- 主容器 ---- */
  .main-wrap {
    position: relative; z-index: 2;
    width: 100%; max-width: 400px;
    display: flex; flex-direction: column; align-items: center;
    gap: 20px;
  }

  /* ---- 头部 ---- */
  .header {
    text-align: center; margin-bottom: 4px;
  }
  .header .icon-row {
    margin-bottom: 8px;
    animation: bounce 2s ease-in-out infinite;
  }
  .header .icon-row svg {
    width: 44px; height: 44px;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .header .title-line1 {
    font-family: 'Caveat', 'Ma Shan Zheng', 'KaiTi', cursive, sans-serif;
    font-size: 38px; font-weight: 700; color: #e8456b;
    letter-spacing: 6px;
    text-shadow: 0 2px 8px rgba(232,69,107,0.15);
    line-height: 1.1;
  }
  .header .title-line2 {
    font-family: 'Caveat', 'Ma Shan Zheng', 'KaiTi', cursive, sans-serif;
    font-size: 30px; font-weight: 600; color: #ff7b9c;
    letter-spacing: 4px;
    text-shadow: 0 2px 6px rgba(255,123,156,0.2);
  }

  /* ---- 模块卡片 ---- */
  .module {
    width: 100%;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 28px;
    box-shadow: 0 8px 32px rgba(255,120,150,0.12), 0 2px 0 rgba(255,255,255,0.8) inset;
    overflow: hidden;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 2.5px solid transparent;
  }
  .module.open {
    border-color: rgba(255,140,160,0.3);
    box-shadow: 0 12px 40px rgba(255,120,150,0.2), 0 2px 0 rgba(255,255,255,0.8) inset;
  }

  /* ---- 模块按钮头 ---- */
  .mod-btn {
    width: 100%; padding: 20px 24px;
    display: flex; align-items: center; gap: 14px;
    background: none; border: none;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .mod-btn:active { background: rgba(255,120,150,0.06); }

  .mod-icon {
    width: 52px; height: 52px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }
  .mod-icon.photos { background: #fff0f5; }
  .mod-icon.video  { background: #fff5ee; }
  .mod-icon.letter { background: #f5f0ff; }

  .mod-info { text-align: left; flex: 1; }
  .mod-info .mod-title {
    font-size: 20px; font-weight: 700; color: #d4446a;
    letter-spacing: 1px;
  }

  .mod-arrow {
    font-size: 18px; color: #e8a0b5;
    transition: transform 0.35s;
  }
  .module.open .mod-arrow { transform: rotate(180deg); }

  /* ---- 模块内容区 ---- */
  .mod-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1), padding 0.35s;
    padding: 0 24px;
  }
  .module.open .mod-body {
    max-height: 600px;
    padding: 0 24px 24px;
  }

  /* 照片区 */
  .photo-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .photo-placeholder {
    aspect-ratio: 1;
    border-radius: 16px;
    background: linear-gradient(135deg, #ffe0ea, #ffd1dc);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    border: 2px dashed #ffc0d0;
  }
  .mod-body .tip-text {
    text-align: center; font-size: 13px; color: #d49ba8;
    margin-top: 12px;
  }

  /* 视频区 */
  .video-placeholder {
    width: 100%; aspect-ratio: 16/10;
    border-radius: 16px;
    background: linear-gradient(135deg, #fff0e8, #ffe8d8);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; font-size: 40px;
    border: 2px dashed #ffd0b8;
  }
  .video-placeholder .play-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(255,140,100,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }

  /* 信区 */
  .letter-card {
    background: linear-gradient(135deg, #fffdf5, #fff8f0);
    border-radius: 16px; padding: 20px;
    border: 1.5px solid #ffe8d0;
    font-size: 15px; color: #a07060; line-height: 1.8;
    position: relative;
  }
  .letter-card::before {
    content: '💌';
    position: absolute; top: -16px; right: 16px;
    font-size: 28px;
  }
  .letter-card .dear {
    font-weight: 700; font-size: 16px; color: #c06050;
  }
  .letter-card .sign {
    margin-top: 12px; text-align: right;
    font-weight: 600; color: #c08070;
  }

  /* ---- 音乐按钮 ---- */
  .music-btn {
    position: fixed; top: 20px; right: 20px; z-index: 30;
    width: 40px; height: 40px; border-radius: 50%;
    border: 2px solid #ffccd5;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(10px);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px rgba(255,120,150,0.12);
    transition: all 0.3s;
  }
  .music-btn.playing {
    border-color: #ff6b81;
    animation: musicGlow 2s ease-in-out infinite;
  }
  @keyframes musicGlow {
    0%, 100% { box-shadow: 0 4px 12px rgba(255,120,150,0.12); }
    50% { box-shadow: 0 4px 24px rgba(255,120,150,0.35); }
  }

  /* ---- 底部小动物 ---- */
  .bottom-animals {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 28vh;
    pointer-events: none; z-index: 1;
    opacity: 0.7;
  }

  @media (prefers-reduced-motion: reduce) {
    .cloud, .falling-heart, .header .icon-row { animation: none; }
    .music-btn.playing { animation: none; }
  }
</style>
</head>
<body>

<button class="music-btn" id="musicBtn" onclick="toggleMusic(event)" title="音乐">🎵</button>

    </button>
    <div class="mod-body">
      <div class="letter-card">
        <p class="dear">亲爱的小何：</p>
        <br>
        <p>这封信的位置，我预留给你。</p>
        <p>写下你想对她说的话，</p>

        <p>她会懂的。</p>

    </div>
  </div>

</main>

<script>
  // ---- 模块折叠 ----
  function toggleModule(id) {
    const mod = document.getElementById(id);
    const isOpen = mod.classList.contains('open');
    // 关闭所有
    document.querySelectorAll('.module.open').forEach(m => m.classList.remove('open'));
    // 打开当前（除非它本来开着）
    if (!isOpen) mod.classList.add('open');
  }

  // ---- 飘落的爱心 ----
  const heartsEmoji = ['💖', '💕', '💗', '🌸', '✨', '💝'];
  function spawnHeart() {
    const el = document.createElement('span');
    el.className = 'falling-heart';
    el.textContent = heartsEmoji[Math.floor(Math.random() * heartsEmoji.length)];
    el.style.left = Math.random() * 95 + '%';
    el.style.fontSize = (16 + Math.random() * 24) + 'px';
    el.style.animationDuration = (8 + Math.random() * 12) + 's';
    el.style.animationDelay = Math.random() * 5 + 's';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => el.remove());
  }
  for (let i = 0; i < 14; i++) spawnHeart();
  setInterval(spawnHeart, 1500);

  // ---- 多样性蓬松云朵 ----
  const clouds = document.getElementById('clouds');
  const cloudShapes = [
    // 宽扁型
    (s) => [
      { w: s, h: s*0.55, x: 0, y: s*0.3 },
      { w: s*0.75, h: s*0.7, x: -s*0.28, y: s*0.12 },
      { w: s*0.7, h: s*0.65, x: s*0.25, y: s*0.08 },
      { w: s*0.55, h: s*0.5, x: -s*0.5, y: s*0.22 },
      { w: s*0.5, h: s*0.45, x: s*0.42, y: s*0.18 },
      { w: s*0.35, h: s*0.35, x: -s*0.6, y: s*0.3 },
    ],
    // 圆胖型
    (s) => [
      { w: s*1.05, h: s*0.8, x: 0, y: s*0.2 },
      { w: s*0.85, h: s*0.85, x: -s*0.2, y: s*0.0 },
      { w: s*0.75, h: s*0.75, x: s*0.25, y: -s*0.02 },
      { w: s*0.55, h: s*0.5, x: -s*0.55, y: s*0.15 },
      { w: s*0.5, h: s*0.45, x: s*0.5, y: s*0.1 },
    ],
    // 小巧型 (更小的 baseSize)
    (s) => [
      { w: s*0.9, h: s*0.5, x: 0, y: s*0.3 },
      { w: s*0.65, h: s*0.6, x: -s*0.25, y: s*0.1 },
      { w: s*0.55, h: s*0.55, x: s*0.2, y: s*0.08 },
      { w: s*0.4, h: s*0.4, x: -s*0.4, y: s*0.2 },
    ],
    // 长条型
    (s) => [
      { w: s, h: s*0.5, x: 0, y: s*0.3 },
      { w: s*0.7, h: s*0.65, x: -s*0.35, y: s*0.15 },
      { w: s*0.65, h: s*0.6, x: s*0.3, y: s*0.1 },
      { w: s*0.55, h: s*0.55, x: -s*0.55, y: s*0.18 },
      { w: s*0.5, h: s*0.5, x: s*0.5, y: s*0.15 },
      { w: s*0.35, h: s*0.35, x: s*0.35, y: s*0.35 },
      { w: s*0.3, h: s*0.3, x: -s*0.5, y: s*0.3 },
    ],
  ];

  function spawnCloud() {
    const wrap = document.createElement('div');
    wrap.className = 'cloud-wrap';
    const shapeIdx = Math.floor(Math.random() * cloudShapes.length);
    const baseSize = 35 + Math.random() * 75;
    const blobs = cloudShapes[shapeIdx](baseSize);
    blobs.forEach(b => {
      const s = document.createElement('span');
      s.style.width = b.w + 'px';
      s.style.height = b.h + 'px';
      s.style.left = b.x + 'px';
      s.style.top = b.y + 'px';
      wrap.appendChild(s);
    });
    wrap.style.top = (5 + Math.random() * 65) + '%';
    wrap.style.animationDuration = (30 + Math.random() * 50) + 's';
    wrap.style.animationDelay = Math.random() * 5 + 's';
    clouds.appendChild(wrap);
    wrap.addEventListener('animationend', () => wrap.remove());
  }
  for (let i = 0; i < 5; i++) { spawnCloud(); }
  setInterval(spawnCloud, 25000);

  // ---- April Encounter 钢琴版 BGM ----
  let audioCtx = null, musicPlaying = false, musicTimer = null;
  const musicBtn = document.getElementById('musicBtn');

  // 《April Encounter》by 很美味 — 主旋律近似 (C大调, ♩=80)
  const melody = [
    // Phrase A1
    { f: 659.25, d: 0.60 }, { f: 587.33, d: 0.30 }, { f: 523.25, d: 0.60 }, { f: 587.33, d: 0.30 },
    { f: 659.25, d: 0.60 }, { f: 659.25, d: 0.30 }, { f: 783.99, d: 0.55 }, { f: 0, d: 0.20 },
    { f: 659.25, d: 0.60 }, { f: 587.33, d: 0.30 }, { f: 523.25, d: 0.60 }, { f: 587.33, d: 0.30 },
    { f: 659.25, d: 0.60 }, { f: 659.25, d: 0.30 }, { f: 587.33, d: 0.55 }, { f: 0, d: 0.25 },
    // Phrase A2
    { f: 523.25, d: 0.60 }, { f: 587.33, d: 0.30 }, { f: 659.25, d: 0.60 }, { f: 783.99, d: 0.30 },
    { f: 880.00, d: 0.60 }, { f: 783.99, d: 0.30 }, { f: 659.25, d: 0.60 }, { f: 587.33, d: 0.30 },
    { f: 523.25, d: 0.60 }, { f: 587.33, d: 0.30 }, { f: 659.25, d: 0.60 }, { f: 587.33, d: 0.30 },
    { f: 523.25, d: 1.20 }, { f: 0, d: 0.40 },
    // Phrase B1 (高潮)
    { f: 880.00, d: 0.60 }, { f: 783.99, d: 0.30 }, { f: 1046.50, d: 0.60 }, { f: 880.00, d: 0.30 },
    { f: 783.99, d: 0.90 }, { f: 659.25, d: 0.30 }, { f: 587.33, d: 0.30 }, { f: 0, d: 0.25 },
    { f: 783.99, d: 0.60 }, { f: 659.25, d: 0.30 }, { f: 880.00, d: 0.60 }, { f: 783.99, d: 0.30 },
    { f: 659.25, d: 0.90 }, { f: 587.33, d: 0.30 }, { f: 523.25, d: 0.30 }, { f: 0, d: 0.25 },
    // Phrase B2
    { f: 659.25, d: 0.60 }, { f: 587.33, d: 0.30 }, { f: 523.25, d: 0.60 }, { f: 440.00, d: 0.30 },
    { f: 523.25, d: 0.60 }, { f: 587.33, d: 0.30 }, { f: 659.25, d: 0.60 }, { f: 783.99, d: 0.30 },
    { f: 587.33, d: 0.55 }, { f: 523.25, d: 0.30 }, { f: 440.00, d: 0.60 }, { f: 523.25, d: 0.30 },
    { f: 523.25, d: 1.50 }, { f: 0, d: 0.60 },
  ];

  function playPianoNote(freq, dur) {
    if (!audioCtx || !musicPlaying) return;
    const now = audioCtx.currentTime;
    // 模拟钢琴音色：基频 + 多个泛音
    const harmonics = [
      { mult: 1, vol: 0.12 },
      { mult: 2, vol: 0.06 },
      { mult: 3, vol: 0.025 },
      { mult: 4, vol: 0.012 },
      { mult: 5, vol: 0.004 },
    ];
    harmonics.forEach(h => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq * h.mult, now);
      // 钢琴包络：快起 -> 自然衰减
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(h.vol, now + 0.02);
      gain.gain.exponentialRampToValueAtTime(h.vol * 0.3, now + dur * 0.3);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + dur + 0.1);
    });
  }

  function playMelody() {
    if (!musicPlaying) return;
    let delay = 0;
    melody.forEach(n => {
      if (n.f > 0) setTimeout(() => playPianoNote(n.f, n.d), delay * 1000);
      delay += n.d;
    });
    const total = melody.reduce((s, n) => s + n.d, 0);
    musicTimer = setTimeout(playMelody, (total + 1.5) * 1000);
  }

  function startMusic() {
    if (musicPlaying) return;
    musicPlaying = true;
    musicBtn.textContent = '🎶';
    musicBtn.classList.add('playing');
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    playMelody();
  }

  function stopMusic() {
    musicPlaying = false;
    musicBtn.textContent = '🎵';
    musicBtn.classList.remove('playing');
    if (musicTimer) clearTimeout(musicTimer);
  }

  function toggleMusic(event) {
    event.stopPropagation();
    musicPlaying ? stopMusic() : startMusic();
  }

  let autoStarted = false;
  document.addEventListener('click', () => {
    if (!autoStarted) { autoStarted = true; startMusic(); }
  }, { once: false });
</script>

</body>
</html>
