<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For 小何 💖</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --pink: #ff7b9c;
    --pink-light: #ffb8cc;
    --peach: #ffb088;
    --bg-top: #fff0f3;
    --bg-mid: #ffe8f0;
    --bg-end: #ffe0ec;
  }

  body {
    min-height: 100vh;
    background: linear-gradient(180deg, #ffd6e3 0%, #ffe4ec 25%, #fff0f5 55%, #fefbfc 85%, #ffffff 100%);
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    display: flex;
    justify-content: center;
    padding: 24px 16px 80px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    cursor: default;
  }

  /* ---- 云朵装饰 ---- */
  .clouds {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0; overflow: hidden;
  }
  .cloud-wrap {
    position: absolute;
    opacity: 0.65;
  }
  @keyframes drift {
    0%   { transform: translateX(-200px); }
    100% { transform: translateX(calc(100vw + 200px)); }
  }
  .cloud-blob {
    position: absolute;
    background: rgba(255,255,255,0.75);
    border-radius: 50%;
  }

  /* ---- 飘落小心心 ---- */
  @keyframes fall {
    0%   { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
  }
  .falling-heart {
    position: fixed; pointer-events: none; z-index: 1;
    font-size: 22px;
    animation: fall linear infinite;
  }

  /* ---- 主容器 ---- */
  .main-wrap {
    position: relative; z-index: 2;
    width: 100%; max-width: 400px;
    display: flex; flex-direction: column; align-items: center;
    gap: 20px;
    animation: fadeInUp 0.8s ease-out;
  }
  @keyframes fadeInUp {
    0%   { opacity: 0; transform: translateY(24px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ---- 头部 ---- */
  .header {
    text-align: center; margin-bottom: 4px;
  }
  .header .icon-row {
    margin-bottom: 8px;
    animation: bounce 2s ease-in-out infinite;
  }
  .header .icon-row svg {
    width: 44px; height: 44px;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .header .title-line1 {
    font-family: 'Caveat', 'Ma Shan Zheng', 'KaiTi', cursive, sans-serif;
    font-size: 38px; font-weight: 700; color: #e8456b;
    letter-spacing: 6px;
    text-shadow: 0 2px 8px rgba(232,69,107,0.15);
    line-height: 1.1;
  }
  .header .title-line2 {
    font-family: 'Caveat', 'Ma Shan Zheng', 'KaiTi', cursive, sans-serif;
    font-size: 30px; font-weight: 600; color: #ff7b9c;
    letter-spacing: 4px;
    text-shadow: 0 2px 6px rgba(255,123,156,0.2);
  }

  /* ---- 模块卡片 ---- */
  .module {
    width: 100%;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-radius: 28px;
    box-shadow: 0 8px 32px rgba(255,120,150,0.12), 0 2px 0 rgba(255,255,255,0.8) inset;
    overflow: hidden;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    border: 2.5px solid transparent;
  }
  .module.open {
    border-color: rgba(255,140,160,0.3);
    box-shadow: 0 12px 40px rgba(255,120,150,0.2), 0 2px 0 rgba(255,255,255,0.8) inset;
  }

  /* ---- 模块按钮头 ---- */
  .mod-btn {
    width: 100%; padding: 20px 24px;
    display: flex; align-items: center; gap: 14px;
    background: none; border: none;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .mod-btn:active { background: rgba(255,120,150,0.06); }

  .mod-icon {
    width: 52px; height: 52px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
    flex-shrink: 0;
  }
  .mod-icon.photos { background: #fff0f5; }
  .mod-icon.video  { background: #fff5ee; }
  .mod-icon.letter { background: #f5f0ff; }

  .mod-info { text-align: left; flex: 1; }
  .mod-info .mod-title {
    font-size: 20px; font-weight: 700; color: #d4446a;
    letter-spacing: 1px;
  }

  .mod-arrow {
    font-size: 18px; color: #e8a0b5;
    transition: transform 0.35s;
  }
  .module.open .mod-arrow { transform: rotate(180deg); }

  /* ---- 模块内容区 ---- */
  .mod-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1), padding 0.35s;
    padding: 0 24px;
  }
  .module.open .mod-body {
    max-height: 600px;
    padding: 0 24px 24px;
  }

  /* 照片区 */
  .photo-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .photo-placeholder {
    aspect-ratio: 1;
    border-radius: 16px;
    background: linear-gradient(135deg, #ffe0ea, #ffd1dc);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    border: 2px dashed #ffc0d0;
  }
  .mod-body .tip-text {
    text-align: center; font-size: 13px; color: #d49ba8;
    margin-top: 12px;
  }

  /* 视频区 */
  .video-placeholder {
    width: 100%; aspect-ratio: 16/10;
    border-radius: 16px;
    background: linear-gradient(135deg, #fff0e8, #ffe8d8);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; font-size: 40px;
    border: 2px dashed #ffd0b8;
  }
  .video-placeholder .play-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(255,140,100,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
  }

  /* 信区 */
  .letter-card {
    background: linear-gradient(135deg, #fffdf5, #fff8f0);
    border-radius: 16px; padding: 20px;
    border: 1.5px solid #ffe8d0;
    font-size: 15px; color: #a07060; line-height: 1.8;
    position: relative;
  }
  .letter-card::before {
    content: '💌';
    position: absolute; top: -16px; right: 16px;
    font-size: 28px;
  }
  .letter-card .dear {
    font-weight: 700; font-size: 16px; color: #c06050;
  }
  .letter-card .sign {
    margin-top: 12px; text-align: right;
    font-weight: 600; color: #c08070;
  }

  /* ---- 音乐按钮 ---- */
  .music-btn {
    position: fixed; top: 20px; right: 20px; z-index: 30;
    width: 40px; height: 40px; border-radius: 50%;
    border: 2px solid #ff8ba0;
    background: rgba(255,140,160,0.18);
    backdrop-filter: blur(10px);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px rgba(255,120,150,0.15);
    transition: all 0.3s;
  }
  .music-btn.loading {
    border-color: #ffb3c0;
    cursor: default;
    animation: spin 1.2s linear infinite;
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  .music-btn.playing {
    border-color: #ff4d6d;
    background: rgba(255,100,130,0.22);
    animation: musicGlow 2s ease-in-out infinite;
  }
  @keyframes musicGlow {
    0%, 100% { box-shadow: 0 4px 12px rgba(255,100,130,0.15); }
    50% { box-shadow: 0 4px 24px rgba(255,100,130,0.4); }
  }

  /* ---- 底部小动物 ---- */
  .bottom-animals {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 28vh;
    pointer-events: none; z-index: 1;
    opacity: 0.7;
  }
  .breathe {
    animation: animalBreath 4s ease-in-out infinite;
    transform-origin: center bottom;
  }
  @keyframes animalBreath {
    0%, 100% { transform: scaleY(1); }
    50% { transform: scaleY(1.04); }
  }

  @media (prefers-reduced-motion: reduce) {
    .cloud-wrap, .falling-heart, .header .icon-row, .breathe { animation: none !important; }
    .music-btn.playing { animation: none; }
  }
</style>
</head>
<body>

      <div class="mod-icon letter">💌</div>
      <div class="mod-info">
        <div class="mod-title">letter</div>
      </div>
      <span class="mod-arrow">▼</span>
    </button>
    <div class="mod-body">
      <div class="letter-card">
        <p class="dear">亲爱的小何：</p>
        <br>
        <p>这封信的位置，我预留给你。</p>
        <p>写下你想对她说的话，</p>
        <p>肉麻一点也没关系。</p>
        <br>
        <p>她会懂的。</p>
        <p class="sign">—— 你的专属后勤部长 💖</p>
      </div>
    </div>
  </div>



</main>

  <!-- 小猪小鸡之间 粉花 (草在200,250) -->
  <g transform="translate(226, 119)">
    <line x1="3" y1="0" x2="3" y2="10" stroke="#c8d8b0" stroke-width="1"/>
    <circle cx="3" cy="-3" r="3.2" fill="#ffe8f0"/><circle cx="3" cy="-3" r="1.3" fill="#ffd0dd"/>
  </g>
  <!-- 小鸡小兔之间 橙花 (草在328) -->
  <g transform="translate(296, 116)">
    <line x1="3" y1="0" x2="3" y2="7" stroke="#c8d8b0" stroke-width="0.9"/>
    <circle cx="3" cy="-2" r="2.8" fill="#fff2e8"/><circle cx="3" cy="-2" r="1.1" fill="#ff8850"/>
  </g>
  <!-- 右边缘 粉花 (草在372) -->
  <g transform="translate(388, 120)">
    <line x1="2" y1="0" x2="2" y2="7" stroke="#c8d8b0" stroke-width="0.9"/>
    <circle cx="2" cy="-2" r="2.8" fill="#ffe8f0"/><circle cx="2" cy="-2" r="1.1" fill="#ffccd8"/>
  </g>

  <!-- === 萤火虫（渐变光圈 + 实心核）=== -->
  <!-- 每只：光圈 + 亮点 -->
  <circle cx="44" cy="108" r="4.5" fill="url(#fireflyGlow)"/><circle cx="44" cy="108" r="1.5" fill="#ffe060" opacity="0.9"/>
  <circle cx="90" cy="102" r="4" fill="url(#fireflyGlow)"/><circle cx="90" cy="102" r="1.3" fill="#ffe060" opacity="0.85"/>
  <circle cx="130" cy="110" r="3.8" fill="url(#fireflyGlow)"/><circle cx="130" cy="110" r="1.2" fill="#ffe060" opacity="0.8"/>
  <circle cx="170" cy="104" r="4.5" fill="url(#fireflyGlow)"/><circle cx="170" cy="104" r="1.6" fill="#ffe060" opacity="0.9"/>
  <circle cx="210" cy="108" r="3.5" fill="url(#fireflyGlow)"/><circle cx="210" cy="108" r="1.1" fill="#ffe060" opacity="0.8"/>
  <circle cx="255" cy="100" r="4.2" fill="url(#fireflyGlow)"/><circle cx="255" cy="100" r="1.4" fill="#ffe060" opacity="0.85"/>
  <circle cx="290" cy="112" r="3.8" fill="url(#fireflyGlow)"/><circle cx="290" cy="112" r="1.2" fill="#ffe060" opacity="0.8"/>
  <circle cx="330" cy="104" r="4" fill="url(#fireflyGlow)"/><circle cx="330" cy="104" r="1.5" fill="#ffe060" opacity="0.9"/>
  <circle cx="360" cy="110" r="3.5" fill="url(#fireflyGlow)"/><circle cx="360" cy="110" r="1.2" fill="#ffe060" opacity="0.85"/>
  <circle cx="70" cy="114" r="3.2" fill="url(#fireflyGlow)"/><circle cx="70" cy="114" r="1" fill="#ffe060" opacity="0.75"/>
  <circle cx="315" cy="106" r="3.5" fill="url(#fireflyGlow)"/><circle cx="315" cy="106" r="1.3" fill="#ffe060" opacity="0.8"/>

</svg>

<script>
  // ---- 模块折叠 ----
  function toggleModule(id) {
    const mod = document.getElementById(id);
    const isOpen = mod.classList.contains('open');
    document.querySelectorAll('.module.open').forEach(m => m.classList.remove('open'));
    if (!isOpen) {
      mod.classList.add('open');
      localStorage.setItem('openModule', id);
    } else {
      localStorage.removeItem('openModule');
    }
  }

  // 记忆上次展开的模块
  (function restoreModule() {
    const saved = localStorage.getItem('openModule');
    if (saved) {
      const mod = document.getElementById(saved);
      if (mod) mod.classList.add('open');
    }
  })();

  // ---- 密度可控的飘落爱心 ----
  const heartsEmoji = ['💖', '💕', '💗', '🌸', '✨', '💝'];
  const HEART_INIT = 25;  // 初始数量 (14 * 1.75)
  const HEART_MAX = 50;   // 上限 (初始 * 2)
  let heartCount = 0;

  function spawnHeart() {
    if (heartCount >= HEART_MAX) return;
    heartCount++;
    const el = document.createElement('span');
    el.className = 'falling-heart';
    el.textContent = heartsEmoji[Math.floor(Math.random() * heartsEmoji.length)];
    el.style.left = Math.random() * 95 + '%';
    el.style.fontSize = (16 + Math.random() * 24) + 'px';
    el.style.animationDuration = (8 + Math.random() * 12) + 's';
    el.style.animationDelay = Math.random() * 3 + 's';
    document.body.appendChild(el);
    el.addEventListener('animationend', () => { el.remove(); heartCount--; });
  }

  for (let i = 0; i < HEART_INIT; i++) spawnHeart();

  // 间隔随密度增大：接近上限时变慢
  function scheduleHeart() {
    if (heartCount >= HEART_MAX) {
      setTimeout(scheduleHeart, 1000); // 满了就等一下再检查
      return;
    }
    spawnHeart();
    const ratio = heartCount / HEART_MAX;
    const next = 800 + ratio * 4000; // 密度低时 ~0.8s/颗，接近上限时 ~4.8s/颗
    setTimeout(scheduleHeart, next);
  }
  setTimeout(scheduleHeart, 2000);

  // ---- 错开出发的蓬松云朵 ----
  const clouds = document.getElementById('clouds');

  // 云朵造型模板：返回 [{w, h, x, y}]，x/y 为正偏移，wrap 会设宽高包住所有 blob
  const cloudShapes = [
    // 宽扁型
    (s) => {
      const offX = s * 0.6; const offY = 0;
      return { w: s * 1.6, h: s * 0.65, offY,
        blobs: [
          { w: s,     h: s*0.55, x: offX + s*0.3,        y: s*0.2 },
          { w: s*0.75,h: s*0.7,  x: offX + s*0.15,       y: s*0.05 },
          { w: s*0.7, h: s*0.65, x: offX + s*0.65,       y: s*0.02 },
          { w: s*0.55,h: s*0.5,  x: offX + s*0.05,       y: s*0.18 },
          { w: s*0.5, h: s*0.45, x: offX + s*0.85,       y: s*0.12 },
          { w: s*0.35,h: s*0.35, x: offX,                 y: s*0.22 },
      ]};
    },
    // 圆胖型
    (s) => {
      const offX = s * 0.55; const offY = s * 0.15;
      return { w: s * 1.7, h: s * 1.0, offY,
        blobs: [
          { w: s*1.05,h: s*0.8,  x: offX + s*0.25,       y: s*0.1 },
          { w: s*0.85,h: s*0.85, x: offX + s*0.05,       y: s*0.0 },
          { w: s*0.75,h: s*0.75, x: offX + s*0.55,       y: s*0.02 },
          { w: s*0.55,h: s*0.5,  x: offX,                 y: s*0.2 },
          { w: s*0.5, h: s*0.45, x: offX + s*0.85,       y: s*0.1 },
      ]};
    },
    // 小巧型
    (s) => {
      const offX = s * 0.4; const offY = 0;
      return { w: s * 1.3, h: s * 0.6, offY,
        blobs: [
          { w: s*0.9, h: s*0.5,  x: offX + s*0.2,        y: s*0.2 },
          { w: s*0.65,h: s*0.6,  x: offX + s*0.05,       y: s*0.05 },
          { w: s*0.55,h: s*0.55, x: offX + s*0.55,       y: s*0.04 },
          { w: s*0.4, h: s*0.4,  x: offX,                 y: s*0.15 },
      ]};
    },
    // 长条型
    (s) => {
      const offX = s * 0.5; const offY = 0;
      return { w: s * 2.0, h: s * 0.55, offY,
        blobs: [
          { w: s,     h: s*0.5,  x: offX + s*0.4,        y: s*0.15 },
          { w: s*0.7, h: s*0.65, x: offX + s*0.2,        y: s*0.05 },
          { w: s*0.65,h: s*0.6,  x: offX + s*0.7,        y: s*0.02 },
          { w: s*0.55,h: s*0.55, x: offX + s*0.05,       y: s*0.1 },
          { w: s*0.5, h: s*0.5,  x: offX + s*0.95,       y: s*0.08 },
          { w: s*0.35,h: s*0.35, x: offX + s*0.85,       y: s*0.2 },
          { w: s*0.3, h: s*0.3,  x: offX + s*0.15,       y: s*0.18 },
      ]};
    },
  ];

  function spawnCloud() {
    const wrap = document.createElement('div');
    wrap.className = 'cloud-wrap';
    const baseSize = 35 + Math.random() * 65;
    const shape = cloudShapes[Math.floor(Math.random() * cloudShapes.length)](baseSize);

    // 设 wrap 尺寸，让子元素绝对定位有参考
    wrap.style.width = shape.w + 'px';
    wrap.style.height = shape.h + 'px';
    wrap.style.top = (5 + Math.random() * 60 - shape.offY) + '%';

    shape.blobs.forEach(b => {
      const el = document.createElement('span');
      el.className = 'cloud-blob';
      el.style.width = b.w + 'px';
      el.style.height = b.h + 'px';
      el.style.left = b.x + 'px';
      el.style.top = b.y + 'px';
      wrap.appendChild(el);
    });

    const dur = 35 + Math.random() * 55;
    wrap.style.animation = `drift ${dur}s linear infinite`;
    // 随机初始相位 — 让云朵分散在屏幕各处
    wrap.style.animationDelay = -(Math.random() * dur) + 's';
    clouds.appendChild(wrap);
  }

  // 密度可控的云朵生成
  const CLOUD_INIT = 14;  // 初始数量 (8 * 1.75)
  const CLOUD_MAX = 28;   // 上限 (初始 * 2)
  let cloudCount = 0;

  // 初始播一批，每朵初始相位不同（负 animation-delay），分散在屏幕各处
  for (let i = 0; i < CLOUD_INIT; i++) { spawnCloud(); cloudCount++; }
  // 动画结束时回收计数
  clouds.addEventListener('animationend', (e) => {
    if (e.target.classList.contains('cloud-wrap')) { cloudCount--; }
  });

  function scheduleCloud() {
    if (cloudCount >= CLOUD_MAX) {
      setTimeout(scheduleCloud, 2000); // 满了等一下再检查
      return;
    }
    spawnCloud(); cloudCount++;
    const ratio = cloudCount / CLOUD_MAX;
    // 密度低 ~5s/朵，接近上限 ~20s/朵
    const next = 5000 + ratio * 15000;
    setTimeout(scheduleCloud, next);
  }
  setTimeout(scheduleCloud, 8000);

  // ---- BGM (April Encounter MP3) ----
  const bgm = document.getElementById('bgmAudio');
  const musicBtn = document.getElementById('musicBtn');
  let audioReady = false;
  let userTouched = false; // 用户是否已经交互过

  musicBtn.textContent = '⏳';
  musicBtn.classList.add('loading');

  bgm.addEventListener('canplaythrough', () => {
    audioReady = true;
    musicBtn.classList.remove('loading');
    // 静音自动播放 → 浏览器不会拦截
    bgm.muted = true;
    bgm.play().then(() => {
      musicBtn.textContent = '🔇';
    }).catch(() => {
      musicBtn.textContent = '▶️';
    });
  }, { once: true });

  function unmuteAndPlay() {
    if (userTouched) return;
    userTouched = true;
    if (bgm.muted) {
      bgm.muted = false;
      bgm.play().catch(() => {});
    }
    musicBtn.textContent = '🎶';
    musicBtn.classList.add('playing');
  }

  function startMusic() {
    if (!bgm.muted) {
      bgm.play().catch(() => {});
      musicBtn.textContent = '🎶';
      musicBtn.classList.add('playing');
    } else {
      unmuteAndPlay();
    }
  }

  function stopMusic() {
    bgm.pause();
    musicBtn.textContent = '⏸️';
    musicBtn.classList.remove('playing');
  }

  function toggleMusic(event) {
    event.stopPropagation();
    if (!audioReady) return;
    if (bgm.paused) {
      startMusic();
    } else {
      stopMusic();
    }
  }

  // 首次点击页面 → 取消静音
  document.addEventListener('click', (e) => {
    if (!userTouched) unmuteAndPlay();
  }, { once: false });
</script>

</body>
</html>
